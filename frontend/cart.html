<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — ShopZone</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar" id="navbar"></nav>

<section class="section">
  <h1 class="section-title" style="margin-bottom:2rem">Shopping <span>Cart</span></h1>

  <div id="cart-wrap">
    <div class="loading-center"><div class="spinner"></div></div>
  </div>
</section>

<footer id="footer"></footer>

<script src="js/main.js"></script>
<script>
  renderNav();
  renderFooter();

  if (!Auth.isLoggedIn()) {
    window.location.href = 'login.html';
  }

  let cartItems = [];

  async function loadCart() {
    try {
      cartItems = await api.get('/cart/');
      renderCart();
    } catch (err) {
      toast('Failed to load cart', 'error');
    }
  }

  function renderCart() {
    const wrap = document.getElementById('cart-wrap');

    if (cartItems.length === 0) {
      wrap.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🛒</div>
          <div class="empty-title">Your cart is empty</div>
          <div class="empty-text">Add some products to get started.</div>
          <a href="index.html" class="btn btn-primary">Continue Shopping</a>
        </div>`;
      return;
    }

    const subtotal  = cartItems.reduce((s, i) => s + i.product.price * i.quantity, 0);
    const shipping  = subtotal >= 5000 ? 0 : 299;
    const total     = subtotal + shipping;

    wrap.innerHTML = `
      <div class="cart-layout">
        <div class="cart-items-list">
          ${cartItems.map(item => `
            <div class="cart-item" id="cart-item-${item.id}">
              <div class="cart-item-img">
                <img src="${item.product.image || 'https://images.unsplash.com/photo-1560393464-5c69a73c5770?w=200'}"
                     alt="${item.product.name}"
                     onerror="this.src='https://images.unsplash.com/photo-1560393464-5c69a73c5770?w=200'">
              </div>
              <div>
                <div class="cart-item-cat">${item.product.category}</div>
                <div class="cart-item-name">${item.product.name}</div>
                <div class="cart-item-price">${formatPrice(item.product.price)}</div>
                <div class="qty-control" style="margin-top:.5rem">
                  <button class="qty-btn" onclick="updateQty(${item.id}, ${item.quantity - 1})">−</button>
                  <span class="qty-num">${item.quantity}</span>
                  <button class="qty-btn" onclick="updateQty(${item.id}, ${item.quantity + 1})">+</button>
                </div>
              </div>
              <div style="text-align:right">
                <div style="font-weight:700;font-size:1rem;color:var(--white);margin-bottom:.75rem">
                  ${formatPrice(item.product.price * item.quantity)}
                </div>
                <button class="btn btn-ghost btn-sm" onclick="removeItem(${item.id})">🗑 Remove</button>
              </div>
            </div>
          `).join('')}

          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:1rem">
            <a href="index.html" class="btn btn-ghost">← Continue Shopping</a>
            <button class="btn btn-danger btn-sm" onclick="clearCart()">🗑 Clear Cart</button>
          </div>
        </div>

        <div class="cart-summary">
          <div class="summary-title">Order Summary</div>
          <div class="summary-row">
            <span>Subtotal (${cartItems.reduce((s,i)=>s+i.quantity,0)} items)</span>
            <span>${formatPrice(subtotal)}</span>
          </div>
          <div class="summary-row">
            <span>Shipping</span>
            <span>${shipping === 0 ? '<span style="color:var(--success)">FREE</span>' : formatPrice(shipping)}</span>
          </div>
          ${shipping > 0 ? `
            <div style="font-size:.78rem;color:var(--light);margin-bottom:.5rem">
              Add ${formatPrice(5000 - subtotal)} more for free shipping
            </div>` : ''}
          <div class="summary-row total">
            <span>Total</span>
            <span class="amount">${formatPrice(total)}</span>
          </div>
          <a href="checkout.html" class="btn btn-primary btn-lg btn-full" style="margin-top:1.2rem">
            Proceed to Checkout →
          </a>
          <div style="text-align:center;font-size:.78rem;color:var(--muted);margin-top:.8rem">
            🔒 Secure SSL Checkout
          </div>
        </div>
      </div>`;
  }

  async function updateQty(itemId, newQty) {
    try {
      if (newQty <= 0) { await removeItem(itemId); return; }
      await api.put(`/cart/${itemId}`, { quantity: newQty });
      cartItems = cartItems.map(i => i.id === itemId ? { ...i, quantity: newQty } : i);
      renderCart();
      updateCartBadge();
    } catch (err) { toast(err.message, 'error'); }
  }

  async function removeItem(itemId) {
    try {
      await api.delete(`/cart/${itemId}`);
      cartItems = cartItems.filter(i => i.id !== itemId);
      renderCart();
      updateCartBadge();
      toast('Item removed', 'info');
    } catch (err) { toast(err.message, 'error'); }
  }

  async function clearCart() {
    if (!confirm('Clear all items from cart?')) return;
    try {
      await api.delete('/cart/');
      cartItems = [];
      renderCart();
      updateCartBadge();
      toast('Cart cleared', 'info');
    } catch (err) { toast(err.message, 'error'); }
  }

  loadCart();
</script>
</body>
</html>
